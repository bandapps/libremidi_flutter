name: Flutter CI

on:
  push:
    branches:
      - main

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install package dependencies
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Test package
        run: flutter test

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Analyze example
        run: flutter analyze
        working-directory: example

      - name: Test example
        run: flutter test
        working-directory: example
