name: Flutter CI

on:
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev libasound2-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install package dependencies
        run: flutter pub get

      - name: Analyze package
        run: flutter analyze

      - name: Test package
        run: flutter test

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Analyze example
        run: flutter analyze
        working-directory: example

      - name: Test example
        run: flutter test
        working-directory: example

      - name: Build Linux example
        run: flutter build linux
        working-directory: example

  macos-integration-test:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Run macOS integration tests
        run: flutter test integration_test
        working-directory: example

  windows-build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install example dependencies
        run: flutter pub get
        working-directory: example

      - name: Build Windows example
        run: flutter build windows
        working-directory: example
